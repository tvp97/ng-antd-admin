<form nz-form [formGroup]="taskForm">
  <nz-form-item>
    <nz-form-label nzFor="title" nzRequired [nzSm]="4" [nzXs]="24">Tiêu đề nhiệm vụ</nz-form-label>
    <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="18" [nzXs]="24">
      <input id="title" formControlName="title" nz-input placeholder="Nhập tiêu đề nhiệm vụ" />
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label nzFor="description" [nzSm]="4" [nzXs]="24">Mô tả nhiệm vụ</nz-form-label>
    <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="18" [nzXs]="24">
      <textarea id="description" formControlName="description" nz-input placeholder="Nhập mô tả nhiệm vụ (tuỳ chọn)" rows="3"></textarea>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label nzFor="priority" nzRequired [nzSm]="4" [nzXs]="24">Độ ưu tiên</nz-form-label>
    <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="18" [nzXs]="24">
      <nz-radio-group formControlName="priority">
        <label nz-radio nzValue="high">Khẩn cấp</label>
        <label nz-radio nzValue="medium">Trung bình</label>
        <label nz-radio nzValue="low">Bình thường</label>
      </nz-radio-group>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label nzFor="tags" [nzSm]="4" [nzXs]="24">Thẻ</nz-form-label>
    <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="18" [nzXs]="24">
      <nz-select formControlName="tags" nzMode="multiple" nzPlaceHolder="Chọn nhãn (tuỳ chọn)">
        @for (tag of availableTags; track tag) {
          <nz-option [nzLabel]="tag" [nzValue]="tag"></nz-option>
        }
      </nz-select>
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label nzFor="assignee" [nzSm]="4" [nzXs]="24">Người phụ trách</nz-form-label>
    <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="18" [nzXs]="24">
      <input id="assignee" formControlName="assignee" nz-input placeholder="Nhập người phụ trách (tuỳ chọn)" />
    </nz-form-control>
  </nz-form-item>

  <nz-form-item>
    <nz-form-label nzFor="dueDate" [nzSm]="4" [nzXs]="24">Hạn chót</nz-form-label>
    <nz-form-control [nzErrorTip]="combineTpl" [nzSm]="18" [nzXs]="24">
      <nz-date-picker id="dueDate" formControlName="dueDate" nzPlaceHolder="Chọn hạn chót (tuỳ chọn)"></nz-date-picker>
    </nz-form-control>
  </nz-form-item>
</form>

<ng-template #combineTpl let-control>
  @if (control.hasError('message')) {
    {{ control.errors.message }}
  }
  @if (control.hasError('required')) {
    Trường bắt buộc
  }
</ng-template>
