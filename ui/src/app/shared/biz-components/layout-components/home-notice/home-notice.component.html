<nz-card [nzBodyStyle]="{ padding: 0 }">
  <nz-tabs nzCentered [nzTabBarStyle]="{ paddingLeft: '15px', paddingRight: '15px' }">
    <nz-tab nzTitle="Thông báo(4)">
      <ng-container *ngTemplateOutlet="notificationTpl"></ng-container>
    </nz-tab>
    <nz-tab nzTitle="Tin nhắn(3)">
      <ng-container *ngTemplateOutlet="notificationTpl"></ng-container>
    </nz-tab>
    <nz-tab nzTitle="Việc cần làm(4)">
      <ng-container *ngTemplateOutlet="notificationTpl"></ng-container>
    </nz-tab>
  </nz-tabs>
</nz-card>
<ng-template #notificationTpl>
  <nz-list nzItemLayout="horizontal">
    @for (i of 4 | numberLoop; track $index) {
      <nz-list-item>
        <nz-list-item-meta>
          <nz-list-item-meta-title>
            <div class="flex p-l-10 p-r-10">
              <span class="flex-1" nz-typography nzEllipsis>Thay đổi mã bên thứ ba khẩn cấp</span>
              <nz-tag class="m-l-10" nzColor="red">Sắp hết hạn</nz-tag>
            </div>
          </nz-list-item-meta-title>
          <nz-list-item-meta-description>
            <div class="p-l-10 p-r-10">
              <p nz-typography nzEllipsis nzType="secondary" [nzEllipsisRows]="3">Quán LâmGửitại 2017-01-06, cần ở 2017-01-07 hoàn thành thay đổi mã trước</p>
              <p>Thời gian phê duyệt:2022-2-22</p>
            </div>
          </nz-list-item-meta-description>
        </nz-list-item-meta>
      </nz-list-item>
    }
    <!--  <nz-list-empty *ngIf="deptNoticeListObj.checkRecordDtos.length === 0"></nz-list-empty>-->
    <nz-list-footer>
      <div class="center operate-text full-with full-height">Xóa thông báo</div>
    </nz-list-footer>
  </nz-list>
</ng-template>
