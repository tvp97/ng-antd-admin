<nz-card>

  <div nz-row>
    <div nz-col nzFlex="94px">Danh mục:</div>
    <div class="tag-wrap" nz-col nzFlex="1" [style.maxHeight]="expanded ? '58px' : '33px'">
      <nz-tag class="m-r-25 m-b-10" nzMode="checkable" (click)="allSel()">
        <span class="sp-14">Tất cả</span>
      </nz-tag>
      @for (tag of tagArray; track tag) {
      <nz-tag class="m-r-25 m-b-10" nzMode="checkable" [(nzChecked)]="tag.isChecked">
        <span class="sp-14">{{ tag.name }}</span>
      </nz-tag>
      }
    </div>
    <div nz-col nzFlex="51px">
      @if (!expanded) {
      <a class="operate-text" (click)="expanded = true">
        Mở rộng
        <i nz-icon nzTheme="outline" nzType="down"></i>
      </a>
      }
      @if (expanded) {
      <a class="operate-text" (click)="expanded = false">
        Thu gọn
        <i nz-icon nzTheme="outline" nzType="up"></i>
      </a>
      }
    </div>
  </div>
  <nz-divider class="m-0" nzDashed></nz-divider>
  <div class="m-t-20 m-b-20" nz-row nzAlign="middle">
    <div nz-col nzFlex="94px">Tùy chọn khác:</div>
    <div nz-col nzFlex="1">
      <div nz-row>
        <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="12" [nzXl]="8" [nzXs]="12" [nzXXl]="8">
          Tác giả:
          <nz-select class="max-width" nzPlaceHolder="Không giới hạn" [(ngModel)]="searchInfo.author">
            <nz-option nzLabel="Vương Chiêu Quân" nzValue="1"></nz-option>
          </nz-select>
        </div>
        <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="12" [nzXl]="8" [nzXs]="12" [nzXXl]="8">
          Đánh giá tốt:
          <nz-select class="max-width" nzPlaceHolder="Không giới hạn" [(ngModel)]="searchInfo.like">
            <nz-option nzLabel="Xuất sắc" nzValue="1"></nz-option>
            <nz-option nzLabel="Bình thường" nzValue="2"></nz-option>
          </nz-select>
        </div>
      </div>
    </div>
  </div>
</nz-card>
<nz-card class="m-t-20">

  <div nz-row [nzGutter]="[16, 16]">
    @for (item of 8 | numberLoop; track $index) {
    <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
      <nz-card nzHoverable [nzCover]="coverTemplate">
        <nz-card-meta nzDescription="Hy vọng là một điều tốt, có lẽ là tốt nhất, và những điều tốt đẹp sẽ không lụi tàn"
          nzTitle="Alipay"></nz-card-meta>
        <div class="card-item-content">
          <span nz-typography nzType="secondary">1giờ trước</span>
          <nz-avatar-group>
            <nz-avatar nzIcon="user" nzSrc="//zos.alipayobjects.com/rmsportal/ODTLcjxAfvqbxHnVXCYX.png"></nz-avatar>
            <nz-avatar nzText="U" style="background-color: #f56a00"></nz-avatar>
            <nz-avatar nz-tooltip nzIcon="user" nzTooltipTitle="NG-ZORRO User"
              style="background-color: #87d068"></nz-avatar>
            <nz-avatar nzText="NG" style="background-color: #1890ff"></nz-avatar>
          </nz-avatar-group>
        </div>
      </nz-card>
    </div>
    }
  </div>
  <ng-template #coverTemplate>
    <img alt="example" src="https://gw.alipayobjects.com/zos/rmsportal/JiqGstEfoWAOHiTxclqi.png" />
  </ng-template>
</nz-card>
