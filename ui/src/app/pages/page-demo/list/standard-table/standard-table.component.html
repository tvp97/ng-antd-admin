<!--Phần đầu-->
<app-page-header [pageHeaderInfo]="pageHeaderInfo" />

<div class="normal-table-wrap">
  <nz-card>
    <app-water-mark />
    <div nz-row>
      <div class="center" nz-col [nzLg]="8" [nzMd]="8" [nzSm]="8" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
        <nz-statistic nzTitle="Việc cần làm của tôi" nzValue="8nhiệm vụ"></nz-statistic>
      </div>
      <div class="center" nz-col nz-row [nzLg]="8" [nzMd]="8" [nzSm]="8" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
        <nz-divider nzType="vertical"></nz-divider>
        <div nz-col nzFlex="1">
          <nz-statistic nzTitle="Thời gian xử lý trung bình tuần này" nzValue="32phút"></nz-statistic>
        </div>
        <nz-divider nzType="vertical"></nz-divider>
      </div>
      <div class="center" nz-col [nzLg]="8" [nzMd]="8" [nzSm]="8" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
        <nz-statistic nzTitle="Nhiệm vụ hoàn thành tuần này" nzValue="24nhiệm vụ"></nz-statistic>
      </div>
    </div>
  </nz-card>
  <nz-card class="m-t-20" nzTitle="Danh sách cơ bản" [nzExtra]="extraTpl">
    <app-water-mark />
    <ng-template #extraTpl>
      <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 8px">
        <nz-radio-group class="m-r-8">
          <label nz-radio-button nzValue="all">Tất cả</label>
          <label nz-radio-button nzValue="ongoing">Đang diễn ra</label>
          <label nz-radio-button nzValue="stay">Đang chờ</label>
        </nz-radio-group>
        <nz-space-compact style="width: 270px">
          <nz-input-search>
            <input nz-input placeholder="Vui lòng nhập" />
          </nz-input-search>
        </nz-space-compact>
      </div>
    </ng-template>
    <button nz-button nzBlock nzType="dashed">
      <i nz-icon nzTheme="outline" nzType="plus"></i>
      <span>Thêm</span>
    </button>
    <nz-list [nzLoading]="isSpinning">
      @for (item of list; track item) {
        <nz-list-item>
          <nz-list-item-meta>
            <nz-list-item-meta-avatar [nzSrc]="item.avatar"></nz-list-item-meta-avatar>
            <nz-list-item-meta-title>
              <a>{{ item.name }}</a>
            </nz-list-item-meta-title>
            <nz-list-item-meta-description>
              {{ item.desc }}
            </nz-list-item-meta-description>
          </nz-list-item-meta>
          <div>
            <div class="list-content-item">
              <div>Owner</div>
              <div>{{ item.owner }}</div>
            </div>
            <div class="list-content-item">
              <div>Thời gian bắt đầu</div>
              <div>{{ item.time }}</div>
            </div>
            <div class="list-content-item">
              <nz-progress [nzPercent]="item.progress" [nzStatus]="item.progress_status"></nz-progress>
            </div>
          </div>
          <ul nz-list-item-actions>
            <nz-list-item-action>
              <a (click)="edit(item)">Sửa</a>
            </nz-list-item-action>
            <nz-list-item-action>
              <a nz-dropdown [nzDropdownMenu]="menu">
                Thêm
                <i nz-icon nzTheme="outline" nzType="down"></i>
              </a>
              <nz-dropdown-menu #menu="nzDropdownMenu">
                <ul nz-menu>
                  <li nz-menu-item (click)="edit(item)">Sửa</li>
                  <li nz-menu-item (click)="deleteItem(item)">Xóa</li>
                </ul>
              </nz-dropdown-menu>
            </nz-list-item-action>
          </ul>
        </nz-list-item>
      }
      <nz-list-pagination>
        <nz-pagination nzShowQuickJumper nzShowSizeChanger [nzPageIndex]="1" [nzPageSize]="5" [nzTotal]="50"></nz-pagination>
      </nz-list-pagination>
    </nz-list>
  </nz-card>
</div>
