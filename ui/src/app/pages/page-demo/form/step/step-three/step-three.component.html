<nz-result nzStatus="success" nzSubTitle="Dự kiến tiền về trong 2 giờ" nzTitle="Thao tác thành công">
  <div nz-result-extra>
    <button nz-button nzType="primary" (click)="next.emit()">Chuyển thêm khoản nữa</button>
    <button nz-button>Xem hóa đơn</button>
  </div>
</nz-result>
@let stepDirection = this.stepDirection();
<div class="desc-bg center" nz-result-content [class.p-l-16]="stepDirection === 'vertical'">
  <div class="determine-wrap p-b-0">
    <nz-descriptions class="m-t-20 p-0">
      <nz-descriptions-item nzTitle="Tài khoản thanh toán">{{ stepDirection }}ant-design&#64;alipay.com</nz-descriptions-item>
      <nz-descriptions-item nzTitle="Tài khoản nhận tiền">test&#64;example.com</nz-descriptions-item>
      <nz-descriptions-item nzTitle="Tên người nhận">Alex</nz-descriptions-item>
      <nz-descriptions-item nzTitle="Số tiền chuyển">500đồng</nz-descriptions-item>
    </nz-descriptions>
  </div>
</div>
