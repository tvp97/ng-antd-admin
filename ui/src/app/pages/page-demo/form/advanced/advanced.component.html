<!--Phần đầu-->
<app-page-header [pageHeaderInfo]="pageHeaderInfo" />

<div class="normal-table-wrap bg-color-no p-b-50">
  <form nz-form nzLayout="vertical" [formGroup]="validateForm">
    <nz-card class="m-b-20" nzTitle="Quản lý kho" nzBordered>

      <app-warehouse-manage-form #warehouseManageComponent
        formControlName="warehouseManage"></app-warehouse-manage-form>
    </nz-card>

    <nz-card class="m-b-20" nzTitle="Quản lý nhiệm vụ" nzBordered>

      <app-task-manage-form #taskManageComponent formControlName="taskManage"></app-task-manage-form>
    </nz-card>

    <nz-card nzTitle="Quản lý thành viên" [nzBordered]="false">

      <app-user-member-manage></app-user-member-manage>
    </nz-card>
  </form>
</div>

<app-footer-submit>
  <button class="right" nz-button nzType="primary" (click)="submit()">Gửi</button>
</app-footer-submit>
