<!--Phần đầu-->
<app-page-header [pageHeaderInfo]="pageHeaderInfo" />

<div class="normal-table-wrap">
  <nz-card>

    <form #baseForm="ngForm" class="form-wrap" nz-form [formGroup]="validateForm" (ngSubmit)="submitForm()">
      <nz-form-item>
        <nz-form-label nzFor="title" nzRequired [nzSm]="6" [nzXs]="24">Tiêu đề</nz-form-label>
        <nz-form-control nzErrorTip="Vui lòng nhập tiêu đề" [nzSm]="14" [nzXs]="24">
          <input id="title" formControlName="title" nz-input placeholder="Đặt tên cho mục tiêu" />
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label nzFor="date" nzRequired [nzSm]="6" [nzXs]="24">Ngày bắt đầu và kết thúc</nz-form-label>
        <nz-form-control nzErrorTip="Vui lòng chọn ngày bắt đầu và kết thúc" [nzSm]="14" [nzXs]="24">
          <nz-range-picker class="with-full" formControlName="date"></nz-range-picker>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label nzFor="desc" nzRequired [nzSm]="6" [nzXs]="24">Mô tả mục tiêu</nz-form-label>
        <nz-form-control nzErrorTip="Vui lòng nhập mô tả mục tiêu" [nzSm]="14" [nzXs]="24">
          <textarea id="desc" formControlName="desc" nz-input placeholder="Vui lòng nhập mục tiêu công việc"
            rows="4"></textarea>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label nzFor="standard" nzRequired [nzSm]="6" [nzXs]="24">Tiêu chuẩn đo lường</nz-form-label>
        <nz-form-control nzErrorTip="Vui lòng nhập tiêu chuẩn" [nzSm]="14" [nzXs]="24">
          <textarea id="standard" formControlName="standard" nz-input placeholder="Vui lòng nhập tiêu chuẩn"
            rows="4"></textarea>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label nzFor="client" nzTooltipTitle="Đối tượng phục vụ mục tiêu" [nzSm]="6" [nzXs]="24">Khách
          hàng</nz-form-label>
        <nz-form-control [nzSm]="14" [nzXs]="24">
          <input id="client" formControlName="client" nz-input
            placeholder="Mô tả khách hàng bạn phục vụ, nếu là nội bộ thì ghi trực tiếp@Họ và tên/Mã nhân viên" />
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label nzFor="invitedCommenter" [nzSm]="6" [nzXs]="24">Người mời đánh giá</nz-form-label>
        <nz-form-control [nzSm]="14" [nzXs]="24">
          <input id="invitedCommenter" formControlName="invitedCommenter" nz-input
            placeholder="Vui lòng trực tiếp@Họ và tên/Mã nhân viên, có thể mời tối đa5người" />
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label nzFor="weights" [nzSm]="6" [nzXs]="24">Trọng số</nz-form-label>
        <nz-form-control [nzSm]="14" [nzXs]="24">
          <nz-input-number id="weights" formControlName="weights" nzPlaceHolder="Vui lòng nhập"
            [nzStep]="1"></nz-input-number>
          %
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label nzFor="public" [nzSm]="6" [nzXs]="24">Mục tiêu công khai</nz-form-label>
        <nz-form-control nz-row nzExtra="Khách hàng, người đánh giá mặc định được chia sẻ" [nzSm]="14" [nzXs]="24">
          <nz-radio-group id="public" formControlName="isPublic">
            <label nz-radio nzValue="1">Công khai</label>
            <label nz-radio nzValue="2">Công khai một phần</label>
            <label nz-radio nzValue="3">Không công khai</label>
          </nz-radio-group>
          @if (validateForm.get('isPublic')!.value === '2') {
          <nz-select class="m-t-5" nzMode="tags" nzPlaceHolder="Please select">
            @for (option of listOfOption; track option) {
            <nz-option [nzLabel]="option.label" [nzValue]="option.value"></nz-option>
            }
          </nz-select>
          }
        </nz-form-control>
      </nz-form-item>
      <nz-form-item nz-row>
        <nz-form-control [nzOffset]="6" [nzSpan]="14">
          <button nz-button nzType="primary">Gửi</button>
          <button class="m-l-10" nz-button nzType="default">Lưu</button>
        </nz-form-control>
      </nz-form-item>
    </form>
  </nz-card>
</div>
