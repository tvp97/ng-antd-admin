<nz-card [nzBordered]="false">
  <nz-result nzStatus="error" nzSubTitle="Vui lòng kiểm tra và sửa thông tin dưới đây, rồi thử lạiGửi。" nzTitle="GửiThất bại">
    <div nz-result-content>
      <div class="desc">
        <h4 class="m-b-20" nz-title>BạnGửiNội dung có lỗi sau:</h4>
        <p class="m-b-8" nz-paragraph>
          <i class="text-error m-r-8" nz-icon nzType="close-circle"></i>
          Tài khoản của bạn đã bị khóa
          <a class="operate-text m-l-20">Mở khóa ngay &gt;</a>
        </p>
        <p nz-paragraph>
          <i class="text-error m-r-8" nz-icon nzType="close-circle"></i>
          Tài khoản của bạn chưa đủ điều kiện đăng ký
          <a class="operate-text m-l-20">Nâng cấp ngay &gt;</a>
        </p>
      </div>
    </div>
    <div nz-result-extra>
      <button nz-button nzType="primary">Quay lạiSửa đổi</button>
    </div>
  </nz-result>
</nz-card>
