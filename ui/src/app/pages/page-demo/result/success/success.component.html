<nz-card [nzBordered]="false">
  <nz-result nzStatus="success"
    nzSubTitle="Gửi Trang kết quả dùng để thông báo trạng thái xử lý, Nếu chỉ thao tác đơn giản, hãy dùng Message Phản hồi thông báo toàn cục là được. Khu vực văn bản này hiển thị thông tin bổ sung ngắn gọn Yêu cầu 'chứng từ', khu vực màu xám dưới đây có thể hiển thị nội dung phức tạp hơn."
    nzTitle="GửiThành công">
    <div nz-result-content>
      <h5 nz-typography>Tên dự án</h5>
      <div class="m-b-20" nz-row [nzGutter]="16">
        <div nz-col [nzLg]="12" [nzMd]="12" [nzSm]="12" [nzXl]="6" [nzXs]="24">
          <span>Dự án ID：</span>
          23421
        </div>
        <div nz-col [nzLg]="12" [nzMd]="12" [nzSm]="12" [nzXl]="6" [nzXs]="24">
          <span>Người phụ trách:</span>
          Khúc Lệ Lệ
        </div>
        <div nz-col [nzLg]="24" [nzMd]="24" [nzSm]="24" [nzXl]="12" [nzXs]="24">
          <span>Thời gian hiệu lực:</span>
          2016-12-12 ~ 2017-12-12
        </div>
      </div>
      <nz-steps nzProgressDot [nzCurrent]="1" [nzDirection]="stepDirection()">
        <nz-step nzTitle="Tạo dự án" [nzDescription]="createDesc">
          <ng-template #createDesc>
            <div class="sp-14 relative">
              <div class="m-t-8 m-b-4">
                Khúc Lệ Lệ
                <i class="m-l-8" nz-icon nzType="dingding"></i>
              </div>
              <div class="m-t-8 m-b-4">2016-12-12 12:32</div>
            </div>
          </ng-template>
        </nz-step>
        <nz-step nzTitle="Phòng ban duyệt vòng 1" [nzDescription]="checkedDesc">
          <ng-template #checkedDesc>
            <div class="sp-14 relative">
              <div class="m-t-8 m-b-4">
                Châu Mao Mao
                <i class="m-l-8" nz-icon nzType="dingding"></i>
              </div>
              <div class="m-t-8 m-b-4">
                <a class="operate-text">Nhắc nhở chút</a>
              </div>
            </div>
          </ng-template>
        </nz-step>
        <nz-step nzTitle="Kế toán kiểm tra"></nz-step>
        <nz-step nzTitle="Hoàn thành"></nz-step>
      </nz-steps>
    </div>
    <div nz-result-extra>
      <div nz-row nzJustify="center">
        <button class="m-r-8" nz-button nzType="primary">Quay lạiDanh sách</button>
        <button class="m-r-8" nz-button>Xem dự án</button>
        <button nz-button>Đánh In</button>
      </div>
    </div>
  </nz-result>
</nz-card>
