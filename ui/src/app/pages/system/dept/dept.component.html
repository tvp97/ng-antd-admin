<!--Phần đầu-->
<app-page-header [pageHeaderInfo]="pageHeaderInfo" />

<div class="normal-table-wrap">
  <nz-card class="m-b-10" nzHoverable [nzBodyStyle]="{ 'padding-bottom': 0 }">
    <form nz-form>
      <div nz-row [nzGutter]="{ xs: 8, sm: 16, md: 24 }">
        <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
          <nz-form-item>
            <nz-form-label [nzFor]="">Tên phòng ban</nz-form-label>
            <nz-form-control>
              <input name="departmentName" nz-input placeholder="Vui lòng nhập tên bộ phận" [(ngModel)]="searchParam.departmentName" />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
          <nz-form-item>
            <nz-form-label [nzFor]="">Trạng thái</nz-form-label>
            <nz-form-control>
              <nz-select name="state" nzAllowClear nzPlaceHolder="Chọn từ danh sách thả xuống" [(ngModel)]="searchParam.state">
                @for (item of stateOptions; track item) {
                  <nz-option [nzLabel]="item.label" [nzValue]="item.value"></nz-option>
                }
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>

        <div class="text-right p-0 m-b-10" nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
          <button nz-button nzType="primary" (click)="getDataList()">
            <i nz-icon nzType="search"></i>
            Tìm kiếm
          </button>
          <button class="m-l-15" nz-button (click)="resetForm()">
            <i nz-icon nzTheme="outline" nzType="close-circle"></i>
            Đặt lại
          </button>
        </div>
      </div>
    </form>
  </nz-card>

  <app-card-table-wrap [btnTpl]="tableBtns" [tableTitle]="'Danh sách phòng ban'" (reload)="reloadTable()">
    <app-tree-table [tableConfig]="tableConfig()" [tableData]="dataList()" (changePageIndex)="getDataList()" (changePageSize)="changePageSize($event)" (sortFn)="changeSort($event)"></app-tree-table>
    <ng-template #operationTpl let-fatherId="fatherId" let-id="id" let-level="level">
      <span *appAuth="ActionCode.DeptEdit" class="operate-text" (click)="edit(id, fatherId)">Sửa</span>
      <span *appAuth="ActionCode.DeptDel" class="operate-text" (click)="del(id)">Xóa</span>
      @if (level < 3) {
        <span class="operate-text" (click)="add(id)">ThêmCấp dưới</span>
      }
    </ng-template>
  </app-card-table-wrap>
</div>

<ng-template #tableBtns>
  <button class="m-r-8" nz-button nzType="primary" (click)="add(0)">
    <i nz-icon nzType="plus"></i>
    Tạo mới
  </button>
</ng-template>

<ng-template #state let-state="state">
  <ng-container *ngTemplateOutlet="state ? yesTpl : notTpl"></ng-container>
</ng-template>
<ng-template #yesTpl>
  <nz-tag nzColor="green">Khả dụng</nz-tag>
</ng-template>
<ng-template #notTpl>
  <nz-tag nzColor="magenta">Vô hiệu hóa</nz-tag>
</ng-template>
