<!--Phần đầu-->
<app-page-header [pageHeaderInfo]="pageHeaderInfo" />

<div class="normal-table-wrap">
  <nz-card class="m-b-10" nzHoverable [nzBodyStyle]="{ 'padding-bottom': 0 }">
    <form nz-form>
      <div nz-row [nzGutter]="{ xs: 8, sm: 16, md: 24 }">
        <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
          <nz-form-item>
            <nz-form-label [nzFor]="">Tên đăng nhậpGọi</nz-form-label>
            <nz-form-control>
              <input name="userName" nz-input placeholder="Nhập tên vai trTên" [(ngModel)]="searchParam.userName" />
            </nz-form-control>
          </nz-form-item>
        </div>

        <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
          <nz-form-item>
            <nz-form-label [nzFor]="">Điện thoại di động</nz-form-label>
            <nz-form-control>
              <input name="mobile" nz-input placeholder="Vui lòng nhập số điện thoại" [(ngModel)]="searchParam.mobile" />
            </nz-form-control>
          </nz-form-item>
        </div>

        @if (!isCollapse) {
          <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
            <nz-form-item>
              <nz-form-label [nzFor]="">Có kích hoạt không</nz-form-label>
              <nz-form-control>
                <nz-select name="available" nzAllowClear nzPlaceHolder="Chọn từ danh sách thả xuống" [(ngModel)]="searchParam.available">
                  @for (item of availableOptions; track item) {
                    <nz-option [nzLabel]="item.label" [nzValue]="item.value"></nz-option>
                  }
                </nz-select>
              </nz-form-control>
            </nz-form-item>
          </div>
          <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="0" [nzXl]="8" [nzXs]="0" [nzXXl]="8">
            <nz-form-item></nz-form-item>
          </div>
          <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="0" [nzXl]="8" [nzXs]="0" [nzXXl]="8">
            <nz-form-item></nz-form-item>
          </div>
        }

        <div class="text-right p-0 m-b-10" nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXl]="8" [nzXs]="24" [nzXXl]="8">
          <button nz-button nzType="primary" (click)="getDataList({ pageIndex: 1 })">
            <i nz-icon nzType="search"></i>
            Tìm kiếm
          </button>
          <button class="m-l-15" nz-button (click)="resetForm()">
            <i nz-icon nzTheme="outline" nzType="close-circle"></i>
            Đặt lại
          </button>
          <a class="collapse operate-text" (click)="toggleCollapse()">
            @if (isCollapse) {
              <span>Mở rộng</span>
            } @else {
              <span>Thu gọn</span>
            }
            <i nz-icon [nzType]="isCollapse ? 'down' : 'up'"></i>
          </a>
        </div>
      </div>
    </form>
  </nz-card>

  <app-card-table-wrap [btnTpl]="tableBtns" [tableTitle]="'Danh sách tài khoản'" (reload)="reloadTable()">
    <app-ant-table
      [checkedCashArrayFromComment]="checkedCashArray"
      [tableConfig]="tableConfig()"
      [tableData]="dataList()"
      (changePageIndex)="getDataList($event)"
      (changePageSize)="changePageSize($event)"
      (selectedChange)="selectedChecked($event)"
    ></app-ant-table>
    <ng-template #operationTpl let-$$dataItem="$$dataItem" let-id="id">
      <span *appAuth="ActionCode.AccountEdit" class="operate-text" (click)="edit(id, $$dataItem)">Sửa</span>
      <span *appAuth="ActionCode.AccountDel" class="operate-text" (click)="del(id)">Xóa</span>
    </ng-template>
  </app-card-table-wrap>

  <ng-template #tableBtns>
    <button class="m-r-8" nz-button nzType="primary" (click)="add()">
      <i nz-icon nzType="plus"></i>
      Tạo mới
    </button>
    <button *appAuth="ActionCode.AccountDel" nz-button nzType="default" (click)="allDel()">
      <i nz-icon nzType="delete"></i>
      Hàng loạtXóa
    </button>
  </ng-template>

  <ng-template #availableFlag let-available="available" let-id="id">
    <nz-switch nzCheckedChildren="Kích hoạt" nzUnCheckedChildren="Vô hiệu hóa" [ngModel]="available" nzControl nzDisabled></nz-switch>
  </ng-template>
</div>
